<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Planner"/>
<meta name="description" content="Daily and monthly task planner"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#BA7517;
  --red:#E24B4A;--blue:#185FA5;--blue-bg:#E6F1FB;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  --amber-bg:#3a2a00;--amber-text:#f0a940;
  --blue-bg:#0d2a45;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:600px;margin:0 auto}
.app{padding:16px;padding-bottom:40px}
.tabs{display:flex;gap:8px;margin-bottom:18px;background:var(--bg2);padding:4px;border-radius:var(--radius-lg)}
.tab{flex:1;padding:9px 0;border:none;border-radius:10px;background:transparent;color:var(--text2);font-size:14px;cursor:pointer;font-weight:500;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.view{display:none}.view.active{display:block}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.nav-btn{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);width:36px;height:36px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.date-title{font-size:17px;font-weight:600;color:var(--text);text-align:center;flex:1}
.add-row{display:flex;gap:8px;margin-bottom:16px}
.add-row input{flex:1;font-size:15px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none}
.add-row input:focus{border-color:var(--amber)}
.add-row input::placeholder{color:var(--text3)}
.flag-btn{padding:0 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);cursor:pointer;display:flex;align-items:center;color:var(--text3)}
.flag-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.flag-btn.on{border-color:var(--amber);background:var(--amber-bg);color:var(--amber-text)}
.add-btn{padding:0 16px;border:none;border-radius:var(--radius);background:var(--text);color:var(--bg);cursor:pointer;font-size:22px;font-weight:300;line-height:1}
.section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.task-list{display:flex;flex-direction:column;gap:7px}
.task{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:0.5px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);transition:opacity .15s}
.task.done{opacity:.5}
.task.important{border-left:3px solid var(--amber);padding-left:11px}
.check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.check.checked{background:var(--amber);border-color:var(--amber)}
.check svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none}
.check.checked svg{display:block}
.task-text{flex:1;font-size:14px;color:var(--text);line-height:1.5;word-break:break-word;padding-top:1px}
.task.done .task-text{text-decoration:line-through;color:var(--text3)}
.task-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.flag-ind{cursor:pointer;display:flex;align-items:center;opacity:.35}
.flag-ind svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.flag-ind.on{opacity:1;color:var(--amber)}
.push-btn{font-size:11px;padding:4px 9px;border:0.5px solid var(--border);border-radius:20px;color:var(--text2);background:var(--bg2);cursor:pointer;white-space:nowrap}
.del-btn{display:flex;align-items:center;cursor:pointer;opacity:.35;color:var(--text)}
.del-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.del-btn:hover{opacity:.8;color:var(--red)}
.pushed-badge{font-size:10px;padding:2px 6px;background:var(--blue-bg);color:var(--blue);border-radius:8px;margin-left:6px}
.empty{text-align:center;padding:40px 16px;color:var(--text3);font-size:14px}
.empty svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:10px;display:block;margin-inline:auto}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-lbl{text-align:center;font-size:11px;color:var(--text3);padding:5px 0;font-weight:500}
.cal-cell{aspect-ratio:1;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:0.5px solid transparent;position:relative;font-size:13px;color:var(--text2);font-weight:400}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.today{background:var(--text);color:var(--bg);font-weight:600}
.cal-cell.selected:not(.today){border-color:var(--amber);color:var(--text)}
.cal-cell.faded{color:var(--text3)}
.dot{position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--amber)}
.cal-cell.has-imp .dot{background:var(--red)}
.month-day-header{font-size:14px;font-weight:600;color:var(--text2);margin:14px 0 10px;padding-bottom:8px;border-bottom:0.5px solid var(--border)}
.month-add{display:flex;gap:8px;margin-top:12px}
.month-add input{flex:1;font-size:14px;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none}
.month-add input:focus{border-color:var(--amber)}
.month-add input::placeholder{color:var(--text3)}
/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:24px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:99;white-space:nowrap}
.toast.show{opacity:1}
/* Install banner */
.install-banner{display:none;align-items:center;gap:10px;padding:12px 14px;background:var(--blue-bg);border-radius:var(--radius-lg);margin-bottom:16px;border:0.5px solid var(--border)}
.install-banner.show{display:flex}
.install-banner p{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.install-banner button{padding:8px 14px;border:none;border-radius:var(--radius);background:var(--text);color:var(--bg);font-size:13px;cursor:pointer;white-space:nowrap;font-weight:500}
</style>
</head>
<body>
<div class="app">
  <div class="install-banner" id="install-banner">
    <p>Install this planner on your device for quick access!</p>
    <button onclick="installApp()">Install</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('day')" id="tab-day">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="15" r="1" fill="currentColor"/></svg>
      Day
    </button>
    <button class="tab" onclick="switchTab('month')" id="tab-month">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Month
    </button>
  </div>

  <!-- Day View -->
  <div class="view active" id="view-day">
    <div class="header">
      <button class="nav-btn" onclick="shiftDay(-1)" aria-label="Previous day">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="date-title" id="day-title"></span>
      <button class="nav-btn" onclick="shiftDay(1)" aria-label="Next day">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="add-row">
      <input id="day-input" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()" autocomplete="off"/>
      <button class="flag-btn" id="flag-btn" onclick="toggleFlag()" aria-label="Mark important">
        <svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      </button>
      <button class="add-btn" onclick="addTask()" aria-label="Add task">+</button>
    </div>
    <div class="section-label">Tasks</div>
    <div class="task-list" id="day-tasks"></div>
  </div>

  <!-- Month View -->
  <div class="view" id="view-month">
    <div class="header">
      <button class="nav-btn" onclick="shiftMonth(-1)" aria-label="Previous month">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="date-title" id="month-title"></span>
      <button class="nav-btn" onclick="shiftMonth(1)" aria-label="Next month">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="month-tasks"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let tasks={};
let dayDate=new Date();
let monthDate=new Date();
let calSelected=null;
let impFlag=false;
let deferredPrompt=null;

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
function installApp(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{
    deferredPrompt=null;
    document.getElementById('install-banner').classList.remove('show');
  });
}

function key(d){return d.toISOString().slice(0,10)}
function getTasks(k){return tasks[k]||(tasks[k]=[])}

function fmtDay(d){
  const today=new Date(),t=key(today),dk=key(d);
  const tom=new Date(today);tom.setDate(tom.getDate()+1);
  const yest=new Date(today);yest.setDate(yest.getDate()-1);
  if(dk===t)return 'Today — '+d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  if(dk===key(tom))return 'Tomorrow — '+d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  if(dk===key(yest))return 'Yesterday — '+d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('view-'+t).classList.add('active');
  if(t==='month')renderMonth();
}

function toggleFlag(){
  impFlag=!impFlag;
  document.getElementById('flag-btn').classList.toggle('on',impFlag);
}

function addTask(){
  const inp=document.getElementById('day-input');
  const text=inp.value.trim();if(!text)return;
  getTasks(key(dayDate)).push({text,done:false,imp:impFlag,id:Date.now()});
  inp.value='';impFlag=false;
  document.getElementById('flag-btn').classList.remove('on');
  renderDay();save();
}

function svgCheck(){return`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`}
function svgFlag(){return`<svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>`}
function svgTrash(){return`<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`}

function taskHTML(t,i,k,allowPush=true){
  return`<div class="task${t.done?' done':''}${t.imp?' important':''}" id="task-${k}-${i}">
    <div class="check${t.done?' checked':''}" onclick="toggleDone('${k}',${i})" role="checkbox" aria-checked="${t.done}">${t.done?svgCheck():''}</div>
    <span class="task-text">${esc(t.text)}${t.pushed?'<span class="pushed-badge">pushed</span>':''}</span>
    <div class="task-actions">
      <span class="flag-ind${t.imp?' on':''}" onclick="toggleImp('${k}',${i})" title="${t.imp?'Remove flag':'Flag as important'}">${svgFlag()}</span>
      ${allowPush?`<button class="push-btn" onclick="pushTask('${k}',${i})">→ tomorrow</button>`:''}
      <span class="del-btn" onclick="delTask('${k}',${i})">${svgTrash()}</span>
    </div>
  </div>`;
}

function renderDay(){
  document.getElementById('day-title').textContent=fmtDay(dayDate);
  const k=key(dayDate),list=getTasks(k);
  const el=document.getElementById('day-tasks');
  if(!list.length){el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>No tasks for this day</div>`;return;}
  el.innerHTML=list.map((t,i)=>taskHTML(t,i,k)).join('');
}

function shiftDay(d){dayDate.setDate(dayDate.getDate()+d);renderDay()}
function shiftMonth(d){monthDate.setMonth(monthDate.getMonth()+d);renderMonth()}

function toggleDone(k,i){getTasks(k)[i].done=!getTasks(k)[i].done;renderDay();renderCalGrid();save()}
function toggleImp(k,i){getTasks(k)[i].imp=!getTasks(k)[i].imp;renderDay();renderCalGrid();save()}
function delTask(k,i){getTasks(k).splice(i,1);renderDay();renderCalGrid();if(calSelected===k)renderMonthTasks();save()}

function pushTask(k,i){
  const t={...getTasks(k)[i],pushed:true,done:false};
  const next=new Date(k);next.setDate(next.getDate()+1);
  const nk=key(next);
  getTasks(nk).push(t);getTasks(k).splice(i,1);
  toast('Pushed to '+next.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}));
  renderDay();renderCalGrid();save();
}

function renderMonth(){
  document.getElementById('month-title').textContent=monthDate.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  renderCalGrid();
  if(calSelected)renderMonthTasks();
  else document.getElementById('month-tasks').innerHTML='<div class="empty" style="padding:20px 0;font-size:13px">Tap a date to see tasks</div>';
}

function renderCalGrid(){
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='Su Mo Tu We Th Fr Sa'.split(' ').map(d=>`<div class="cal-lbl">${d}</div>`).join('');
  const y=monthDate.getFullYear(),m=monthDate.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=key(new Date());
  for(let i=0;i<first;i++)grid.innerHTML+=`<div class="cal-cell faded"></div>`;
  for(let d=1;d<=days;d++){
    const date=new Date(y,m,d),dk=key(date);
    const list=getTasks(dk);
    const hasImp=list.some(t=>t.imp&&!t.done),hasTasks=list.length>0;
    grid.innerHTML+=`<div class="cal-cell${dk===today?' today':''}${calSelected===dk?' selected':''}${hasImp?' has-imp':hasTasks?' has-tasks':''}" onclick="selectDate('${dk}')">${d}${hasTasks||hasImp?'<div class="dot"></div>':''}</div>`;
  }
}

function selectDate(dk){calSelected=dk;renderCalGrid();renderMonthTasks()}

function renderMonthTasks(){
  const el=document.getElementById('month-tasks');
  const list=getTasks(calSelected);
  const d=new Date(calSelected);
  const label=d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  let html=`<div class="month-day-header">${label}</div>`;
  if(list.length){
    html+=`<div class="task-list">${list.map((t,i)=>taskHTML(t,i,calSelected)).join('')}</div>`;
  }else{
    html+=`<div style="font-size:13px;color:var(--text3);padding:10px 0">No tasks for this day</div>`;
  }
  html+=`<div class="month-add"><input id="month-inp" placeholder="Add task for this day…" onkeydown="if(event.key==='Enter')addMonthTask()" autocomplete="off"/><button class="add-btn" onclick="addMonthTask()">+</button></div>`;
  el.innerHTML=html;
}

function addMonthTask(){
  const inp=document.getElementById('month-inp');
  const text=inp.value.trim();if(!text)return;
  getTasks(calSelected).push({text,done:false,imp:false,id:Date.now()});
  inp.value='';renderMonthTasks();renderCalGrid();save();
}

function toggleDone(k,i){getTasks(k)[i].done=!getTasks(k)[i].done;if(k===key(dayDate))renderDay();if(calSelected===k)renderMonthTasks();renderCalGrid();save()}
function toggleImp(k,i){getTasks(k)[i].imp=!getTasks(k)[i].imp;if(k===key(dayDate))renderDay();if(calSelected===k)renderMonthTasks();renderCalGrid();save()}
function delTask(k,i){getTasks(k).splice(i,1);if(k===key(dayDate))renderDay();if(calSelected===k)renderMonthTasks();renderCalGrid();save()}
function pushTask(k,i){
  const t={...getTasks(k)[i],pushed:true,done:false};
  const next=new Date(k);next.setDate(next.getDate()+1);
  const nk=key(next);
  getTasks(nk).push(t);getTasks(k).splice(i,1);
  toast('Pushed to '+next.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}));
  if(k===key(dayDate))renderDay();if(calSelected===k)renderMonthTasks();renderCalGrid();save();
}

function esc(s){const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function save(){try{localStorage.setItem('planner-v1',JSON.stringify(tasks))}catch(e){}}
function load(){try{const d=localStorage.getItem('planner-v1');if(d)tasks=JSON.parse(d)}catch(e){}}

load();renderDay();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
